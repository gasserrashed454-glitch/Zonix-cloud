<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zonix | Cloud Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        html, body { background-color: #0d0e12; color: #adb5bd; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; position: fixed; width: 100%; margin: 0; }
        .sidebar { background-color: #15171e; border-right: 1px solid #1e2129; width: 260px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-header { background: rgba(59, 130, 246, 0.05); border-bottom: 1px solid #1e2129; padding: 24px; }
        .nav-item { color: #8a8d93; transition: all 0.2s; border-left: 3px solid transparent; display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #1c1f26; color: #fff; border-left-color: #3b82f6; }
        .nav-label { font-size: 11px; font-weight: 700; color: #495057; text-transform: uppercase; letter-spacing: 1px; padding: 24px 24px 8px; }
        .stat-card { background: #15171e; border: 1px solid #1e2129; border-radius: 8px; padding: 20px; }
        .btn-action { padding: 8px 16px; border-radius: 4px; font-weight: 700; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-start { background: #10b981; color: white; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-restart { background: #3b82f6; color: white; }
        #login-gate { background: #0d0e12; position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        input, select { background: #1c1f26; border: 1px solid #2d3139; border-radius: 4px; padding: 12px; color: white; outline: none; width: 100%; }
        .view-section { display: none; height: 100%; overflow-y: auto; padding: 32px; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="w-full max-w-sm px-6">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-4xl font-bold mb-4">Z</div>
                <h1 class="text-white text-2xl font-semibold">Zonix Access</h1>
