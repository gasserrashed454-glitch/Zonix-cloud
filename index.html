<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix Cloud | Secure Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-blue { box-shadow: 0 0 25px rgba(59, 130, 246, 0.3); }
        #login-gate { position: fixed; inset: 0; z-index: 999; background: #050505; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
        .hidden-gate { opacity: 0; pointer-events: none; visibility: hidden; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="w-full max-w-sm p-10 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center font-black text-white text-4xl neon-blue mb-10">Z</div>
            <h2 class="text-2xl font-black uppercase tracking-[0.2em] text-white mb-4">Encrypted</h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.4em] mb-10">Verification Required</p>
            
            <input type="password" id="ceo-pass" placeholder="ACCESS KEY" 
                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-center text-sm tracking-[0.5em] text-blue-400 focus:outline-none focus:border-blue-500/50 mb-6 transition-all">
            
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl text-[10px] uppercase tracking-[0.3em] transition-all active:scale-95">
                Authorize Access
            </button>
            <p id="error-msg" class="text-red-500 text-[10px] mt-6 opacity-0 uppercase font-black tracking-widest transition-opacity">Access Denied</p>
        </div>
    </div>

    <div id="main-dashboard" class="opacity-0 translate-y-4 p-6 md:p-16 transition-all duration-1000 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-20">
            <div class="flex items-center gap-6">
                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white text-2xl neon-blue">Z</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter text-white uppercase leading-none">Zonix <span class="text-blue-500">Cloud</span></h1>
                    <p class="text-[10px] text-gray-600 tracking-[0.5em] uppercase mt-2 font-bold">Secure Data Environment</p>
                </div>
            </div>
            <button id="connectBtn" onclick="connectOneDrive()" class="w-full md:w-auto border border-blue-500/30 text-blue-400 px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-[0.2em] hover:bg-blue-500/10 transition-all">
                Connect OneDrive
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
            <div class="glass p-10 rounded-[2.5rem] relative">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter">OneDrive</h2>
                    <i class="fa-brands fa-windows text-blue-500 text-xl"></i>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <span class="text-[10px] text-blue-500 font-mono font-black tracking-widest">100 GB CAPACITY</span>
                    <span id="od-status" class="text-[10px] text-gray-600 uppercase font-black tracking-widest">Disconnected</span>
                </div>
                <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                    <div id="progress" class="bg-blue-500 h-full w-0 transition-all duration-[2000ms] ease-out"></div>
                </div>
            </div>

            <div class="glass p-10 rounded-[2.5rem] relative opacity-40 grayscale">
                <div class="flex justify-between items-start mb-8">
                    <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter">Degoo</h2>
                    <i class="fa-solid fa-cloud text-yellow-600 text-xl"></i>
                </div>
                <div class="flex justify-between items-end">
                    <span class="text-[10px] text-yellow-600 font-mono font-black tracking-widest">20 GB CAPACITY</span>
                    <span class="text-[10px] text-gray-600 uppercase font-black tracking-widest">In Queue</span>
                </div>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden">
            <div class="px-10 py-6 border-b border-white/5 bg-white/[0.01] flex justify-between items-center">
                <span class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-500">Secure File System</span>
                <i class="fa-solid fa-shield-halved text-blue-500/30"></i>
            </div>
            <div id="fileList" class="min-h-[500px] flex flex-col items-center justify-center p-20 text-center">
                <div class="w-12 h-12 border-2 border-white/5 border-t-blue-500 rounded-full animate-spin mb-6"></div>
                <p class="text-[10px] uppercase tracking-[0.3em] font-black text-gray-700">Awaiting Secure Handshake...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. IMPROVED PIN CHECK
        function checkAccess() {
            const passInput = document.getElementById('ceo-pass');
            const error = document.getElementById('error-msg');
            
            if (passInput.value === "zonix2026") {
                document.getElementById('login-gate').classList.add('hidden-gate');
                const dash = document.getElementById('main-dashboard');
                dash.classList.remove('opacity-0', 'translate-y-4');
            } else {
                error.style.opacity = "1";
                passInput.value = "";
                passInput.classList.add('border-red-500');
                setTimeout(() => {
                    error.style.opacity = "0";
                    passInput.classList.remove('border-red-500');
                }, 2000);
            }
        }

        // 2. MICROSOFT AUTH
        const msalConfig = {
            auth: {
                clientId: "1c7b8cf1-f3e7-4708-88df-7a82f6869783",
                authority: "https://login.microsoftonline.com/common",
                redirectUri: "https://gasserrashed454-glitch.github.io/Zonix-cloud/"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        async function connectOneDrive() {
            try {
                const loginResponse = await msalInstance.loginPopup({
                    scopes: ["user.read", "Files.Read.All"],
                    prompt: "select_account"
                });
                
                document.getElementById('od-status').innerText = "Online / Secure";
                document.getElementById('od-status').className = "text-[10px] text-green-500 font-black tracking-widest uppercase";
                document.getElementById('progress').style.width = "100%";
                document.getElementById('connectBtn').innerText = "Terminal Linked";
                document.getElementById('connectBtn').className = "bg-green-600/10 text-green-500 border border-green-500/30 px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-[0.2em]";
                
                getFiles(loginResponse.accessToken);
            } catch (err) {
                console.error(err);
            }
        }

        async function getFiles(token) {
            const response = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", {
                headers: { Authorization: `Bearer ${token}` }
            });
            const data = await response.json();
            renderFiles(data.value);
        }

        function renderFiles(files) {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            list.className = "p-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
            
            if (!files || files.length === 0) {
                list.innerHTML = '<p class="col-span-full text-gray-600 text-xs uppercase font-bold tracking-widest">No accessible nodes found.</p>';
                return;
            }

            files.forEach(file => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-5 p-6 rounded-3xl bg-white/[0.03] border border-white/5 hover:border-blue-500/40 hover:bg-white/[0.05] transition-all cursor-pointer group";
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-blue-500/20 transition-all">
                        <i class="fa-solid ${file.folder ? 'fa-folder text-blue-500' : 'fa-file-lines text-gray-500'} text-lg"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-[11px] font-black text-gray-300 truncate tracking-tight">${file.name}</p>
                        <p class="text-[8px] text-gray-600 uppercase font-bold mt-1">${file.folder ? 'Directory' : 'Data File'}</p>
                    </div>
                `;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
