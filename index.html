<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zonix | v2.6.8 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        :root { --bg: #050507; --accent: #3b82f6; --glass: rgba(15, 17, 23, 0.95); }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        #login-gate { position: fixed; inset: 0; z-index: 10000; background: #050507; display: flex; align-items: center; justify-content: center; }
        .input-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; color: white; width: 100%; font-family: 'JetBrains Mono', monospace; outline: none; }
        .sidebar { width: 260px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(255,255,255,0.05); background: #08090d; z-index: 50; }
        .sidebar.minimized { width: 80px; }
        .sidebar.minimized .nav-text, .sidebar.minimized .profile-details { display: none; }
        .nav-link { padding: 12px 20px; border-radius: 12px; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-weight: 600; transition: 0.2s; cursor: pointer; margin: 4px 12px; font-size: 13px; }
        .nav-link.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        .storage-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; }
        .hidden { display: none !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="w-[340px] p-8 glass-panel rounded-[32px] text-center border-blue-500/20 border">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl font-extrabold mb-6 shadow-lg shadow-blue-600/20">Z</div>
            <h2 class="text-lg font-extrabold text-white mb-2">Node Authorization</h2>
            <p class="text-[9px] text-gray-500 mb-6 uppercase tracking-widest">Verify Handshake Protocol</p>
            <input type="password" id="access-pass" class="input-box mb-4 text-center" placeholder="Access Token">
            <button id="auth-btn" onclick="authorize()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest transition-all active:scale-95">Verify & Boot</button>
        </div>
    </div>

    <div id="app" class="hidden flex h-full">
        <aside id="sidebar" class="sidebar flex flex-col">
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex-shrink-0 flex items-center justify-center text-white font-bold">Z</div>
                    <span class="nav-text text-white font-black text-lg italic">ZONIX</span>
                </div>
                <button onclick="toggleSidebar()" class="text-gray-500"><i id="toggle-icon" class="fa-solid fa-chevron-left"></i></button>
            </div>
            <nav class="flex-1">
                <div onclick="tab('files')" id="nav-files" class="nav-link active"><i class="fa-solid fa-folder-tree w-5"></i> <span class="nav-text">Unified Files</span></div>
                <div onclick="tab('cloud')" id="nav-cloud" class="nav-link"><i class="fa-solid fa-cloud w-5"></i> <span class="nav-text">Cloud Monitor</span></div>
                <div onclick="tab('terminal')" id="nav-terminal" class="nav-link"><i class="fa-solid fa-terminal w-5"></i> <span class="nav-text">Root Console</span></div>
                <div onclick="tab('profile')" id="nav-profile" class="nav-link"><i class="fa-solid fa-user-pen w-5"></i> <span class="nav-text">Settings</span></div>
            </nav>
            <div class="p-4 border-t border-white/5">
                <div class="glass-panel rounded-xl p-3 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500 font-bold text-[10px]">MR</div>
                    <div class="profile-details overflow-hidden">
                        <p id="display-name" class="text-[11px] text-white font-bold truncate">Mohamed Rashed</p>
                        <span id="user-perm-badge" class="text-[8px] font-black uppercase tracking-tighter text-blue-500">---</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-[#050507]">
            <section id="view-files" class="space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-extrabold text-white">Storage Node</h2>
                    <button id="ms-init" onclick="syncMicrosoftNode()" class="bg-white hover:bg-gray-200 text-black px-5 py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-wider">Link Microsoft</button>
                </div>
                <div id="file-list" class="grid gap-3">
                    <div class="glass-panel p-10 rounded-2xl text-center border-dashed border-white/10 border">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-white/10 mb-4"></i>
                        <p class="text-xs text-gray-500">Node standby. Connect cloud to begin indexing.</p>
                    </div>
                </div>
            </section>

            <section id="view-cloud" class="hidden space-y-6">
                <h2 class="text-2xl font-extrabold text-white">Cloud Health</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="storage-card border-blue-500/20">
                        <div class="flex justify-between mb-4">
                            <i class="fa-brands fa-microsoft text-blue-500 text-xl"></i>
                            <div id="ms-status" class="text-[8px] font-black text-gray-500 uppercase">Standby</div>
                        </div>
                        <div class="w-full bg-white/5 h-1 rounded-full mb-3">
                            <div id="ms-bar" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
                        </div>
                        <p id="ms-val" class="text-xs text-white font-mono tracking-tighter">-- / --</p>
                    </div>
                </div>
            </section>

            <section id="view-terminal" class="hidden space-y-4">
                <h2 class="text-2xl font-extrabold text-white">Root Console</h2>
                <div id="console-output" class="glass-panel p-6 rounded-2xl font-mono text-[11px] h-80 overflow-y-auto text-emerald-500/80 border-emerald-500/10 border">
                    <p class="text-gray-600 mb-2">// ZONIX v2.6.8 STABLE READY...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const CLIENT_ID = "65edd14c-cf8a-4e75-8b19-1b185fc86b78";
        const SYSTEM_CONFIG = {
            vault: {
                "zonix2026": { rank: "ROOT ADMIN", color: "text-red-500", access: ["files", "cloud", "terminal", "profile"] },
                "smr2010000": { rank: "EDITOR", color: "text-blue-500", access: ["files", "cloud", "profile"] }
            }
        };

        const msalConfig = {
            auth: { 
                clientId: CLIENT_ID, 
                authority: "https://login.microsoftonline.com/common",
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
        };

        const client = new msal.PublicClientApplication(msalConfig);

        client.handleRedirectPromise().then(res => {
            if (res) {
                authorizeSilent();
                fetchMicrosoftQuota(res.accessToken);
            }
        });

        function authorize() {
            const pass = document.getElementById('access-pass').value;
            if(SYSTEM_CONFIG.vault[pass]) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('user-perm-badge').innerText = SYSTEM_CONFIG.vault[pass].rank;
            } else {
                document.getElementById('access-pass').classList.add('animate-shake');
            }
        }

        function authorizeSilent() {
            document.getElementById('login-gate').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        async function syncMicrosoftNode() {
            const request = {
                scopes: ["User.Read", "Files.ReadWrite.All"],
                prompt: "select_account"
            };
            try {
                const response = await client.loginPopup(request);
                fetchMicrosoftQuota(response.accessToken);
            } catch (err) {
                client.loginRedirect(request);
            }
        }

        async function fetchMicrosoftQuota(token) {
            try {
                const res = await fetch("https://graph.microsoft.com/v1.0/me/drive", {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await res.json();
                
                const total = (data.quota.total / (1024 ** 3)).toFixed(1);
                const used = (data.quota.used / (1024 ** 3)).toFixed(2);
                const percent = ((used / total) * 100).toFixed(1);

                document.getElementById('ms-status').innerText = "LIVE NODE";
                document.getElementById('ms-status').className = "text-[8px] font-black text-blue-500 uppercase";
                document.getElementById('ms-bar').style.width = `${percent}%`;
                document.getElementById('ms-val').innerText = `${used}GB / ${total}GB (${percent}%)`;
                
                logTerminal(`Handshake verified. Quota: ${used}GB used.`);
                fetchFiles(token);
            } catch (err) {
                logTerminal("Handshake failed to parse quota.");
            }
        }

        async function fetchFiles(token) {
            const list = document.getElementById('file-list');
            const res = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", {
                headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            list.innerHTML = "";
            data.value.forEach(file => {
                const div = document.createElement('div');
                div.className = "glass-panel p-4 rounded-xl flex items-center justify-between";
                div.innerHTML = `<div class="flex items-center gap-3"><i class="fa-solid fa-file text-blue-500"></i><p class="text-[11px] font-bold">${file.name}</p></div>`;
                list.appendChild(div);
            });
        }

        function logTerminal(msg) {
            const out = document.getElementById('console-output');
            const p = document.createElement('p');
            p.innerText = `> [LOG] ${msg}`;
            out.appendChild(p);
        }

        function tab(v) {
            ['files', 'cloud', 'terminal', 'profile'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('minimized'); }
    </script>
</body>
</html>
