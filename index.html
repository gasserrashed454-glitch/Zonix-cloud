<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <title>Zonix | Command Center</title>
</head>
<body class="bg-[#050505] text-gray-200 font-sans selection:bg-blue-500/30">

    <nav class="border-b border-white/5 p-4 flex justify-between items-center backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <div class="w-11 h-11 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.3)]">
                <span class="text-white font-black text-2xl italic">Z</span>
            </div>
            <div>
                <h1 class="text-white font-bold tracking-tighter text-lg leading-none">ZONIX <span class="text-blue-500">CLOUD</span></h1>
                <span class="text-[9px] text-gray-500 uppercase tracking-[0.2em]">Private Dashboard</span>
            </div>
        </div>
        <button onclick="loginOneDrive()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-all">
            Link OneDrive
        </button>
    </nav>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white/5 border border-white/10 p-6 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-blue-400 font-bold uppercase text-xs tracking-widest">Active Drive</h3>
                    <span id="od-status" class="text-[10px] text-gray-500">Offline</span>
                </div>
                <div class="text-3xl font-bold text-white mb-1">OneDrive</div>
                <div class="w-full bg-white/5 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="od-progress" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
                </div>
            </div>

            <div class="bg-white/5 border border-white/10 p-6 rounded-3xl">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-yellow-500 font-bold uppercase text-xs tracking-widest">Massive Storage</h3>
                    <span class="text-[10px] text-gray-500">20 GB Pending</span>
                </div>
                <div class="text-3xl font-bold text-white mb-1">Degoo</div>
                <div class="w-full bg-white/5 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div class="bg-yellow-500 h-full w-[10%] opacity-20"></div>
                </div>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden min-h-[300px]">
            <div class="p-4 border-b border-white/5 bg-white/[0.02] flex justify-between">
                <span class="text-xs font-bold uppercase text-gray-400">Secure File Explorer</span>
            </div>
            <div id="file-list" class="p-10 text-center text-gray-500 text-sm">
                Awaiting Connection...
            </div>
        </div>
    </main>

    <script>
        const msalConfig = {
            auth: {
                clientId: "65a01bbc-e3d6-4c97-98f6-0393a6a09610", 
                authority: "https://login.microsoftonline.com/common"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        async function loginOneDrive() {
            try {
                const loginResponse = await msalInstance.loginPopup({
                    scopes: ["user.read", "Files.Read.All"]
                });
                document.getElementById('od-status').innerText = "ONLINE";
                document.getElementById('od-status').className = "text-[10px] text-green-500 font-bold";
                document.getElementById('od-progress').style.width = "20%";
                fetchFiles(loginResponse.accessToken);
            } catch (err) {
                console.error(err);
                alert("Please check your Redirect URI in Azure Settings!");
            }
        }

        async function fetchFiles(token) {
            const res = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", {
                headers: { Authorization: `Bearer ${token}` }
            });
            const data = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            list.className = "grid grid-cols-1 divide-y divide-white/5";
            
            data.value.forEach(file => {
                list.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-white/[0.02] transition-colors">
                        <span class="text-sm font-medium">${file.name}</span>
                        <span class="text-[10px] text-gray-500 uppercase tracking-tighter">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
