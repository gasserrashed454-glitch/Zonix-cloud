<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zonix Cloud | Secure Multi-Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background-color: #030303; color: #f0f0f0; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); border: 1px solid rgba(59, 130, 246, 0.5); }
        #login-gate { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .sidebar-item { transition: all 0.3s ease; border-right: 3px solid transparent; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .active-node { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-right: 3px solid #3b82f6; }
        .file-card { transition: transform 0.2s, background 0.2s; }
        .file-card:hover { transform: translateY(-3px); background: rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="w-full max-w-sm p-10 text-center glass rounded-[40px] neon-border">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center font-bold text-white text-4xl mb-6 shadow-[0_0_30px_rgba(37,99,235,0.5)]">Z</div>
            <h2 class="text-2xl font-bold tracking-tighter text-white mb-2">Zonix Private</h2>
            <p class="text-[10px] text-blue-400 uppercase tracking-[0.4em] font-bold mb-10">Terminal Lock active</p>
            <input type="password" id="ceo-pass" placeholder="••••••••" 
                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-center text-xl text-blue-400 focus:outline-none focus:border-blue-500/50 mb-6 transition-all">
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl text-xs uppercase tracking-widest transition-all">
                Decrypt Access
            </button>
            <p id="error-msg" class="text-red-500 text-[10px] mt-6 opacity-0 font-bold uppercase tracking-widest">Invalid Security Key</p>
        </div>
    </div>

    <div id="main-dashboard" class="hidden flex h-screen">
        
        <div class="w-20 md:w-64 border-r border-white/5 flex flex-col items-center md:items-start py-8 glass">
            <div class="px-6 mb-12 hidden md:block">
                <h1 class="text-xl font-bold italic tracking-tighter">ZONIX<span class="text-blue-500">CLOUD</span></h1>
            </div>
            
            <nav class="w-full space-y-2">
                <div id="nav-onedrive" onclick="switchNode('onedrive')" class="sidebar-item active-node flex items-center gap-4 px-6 py-4 cursor-pointer">
                    <i class="fa-brands fa-microsoft text-lg"></i>
                    <span class="hidden md:block font-medium">OneDrive</span>
                </div>
                <div id="nav-gdrive" onclick="switchNode('gdrive')" class="sidebar-item flex items-center gap-4 px-6 py-4 cursor-pointer text-gray-500 hover:text-white">
                    <i class="fa-brands fa-google-drive text-lg"></i>
                    <span class="hidden md:block font-medium">G-Drive</span>
                </div>
                <div class="sidebar-item flex items-center gap-4 px-6 py-4 cursor-pointer opacity-30 pointer-events-none">
                    <i class="fa-brands fa-dropbox text-lg"></i>
                    <span class="hidden md:block font-medium">Dropbox</span>
                </div>
            </nav>

            <div class="mt-auto px-6 w-full hidden md:block">
                <div class="p-4 rounded-2xl bg-blue-500/5 border border-blue-500/10">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Node Status</p>
                    <p id="status-text" class="text-xs text-gray-400">Offline</p>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 md:p-12">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h2 id="node-title" class="text-3xl font-bold tracking-tight">OneDrive Node</h2>
                    <p id="node-desc" class="text-sm text-gray-500">Awaiting encrypted handshake</p>
                </div>
                <button id="connectBtn" onclick="initiateAuth()" class="bg-white text-black px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all">
                    Initialize Node
                </button>
            </header>

            <div id="stats-area" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="glass p-6 rounded-[30px]">
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Available Capacity</p>
                    <p id="cap-val" class="text-2xl font-bold text-white">---</p>
                </div>
                <div class="glass p-6 rounded-[30px]">
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Sync Engine</p>
                    <p id="sync-val" class="text-2xl font-bold text-gray-700">Inactive</p>
                </div>
                <div class="glass p-6 rounded-[30px] border-l-4 border-blue-600">
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Auth Instance</p>
                    <p class="text-xs font-mono text-blue-400 truncate">AZ-65EDD14C</p>
                </div>
            </div>

            <div class="glass rounded-[40px] p-2 min-h-[500px] border border-white/5">
                <div id="fileList" class="flex flex-col items-center justify-center h-full min-h-[400px] text-gray-600">
                    <i class="fa-solid fa-terminal text-4xl mb-4 opacity-10"></i>
                    <p class="text-xs uppercase tracking-[0.2em] font-bold">Select and initialize a cloud node</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentNode = 'onedrive';

        function checkAccess() {
            const input = document.getElementById('ceo-pass').value.toLowerCase();
            const authorizedKeys = ["zonix2026", "smr2010000"];

            if (authorizedKeys.includes(input)) {
                document.getElementById('login-gate').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-gate').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                }, 500);
            } else {
                const msg = document.getElementById('error-msg');
                msg.style.opacity = "1";
                setTimeout(() => msg.style.opacity = "0", 2000);
            }
        }

        const msalConfig = {
            auth: {
                clientId: "65edd14c-cf8a-4e75-8b19-1b185fc86b78", 
                authority: "https://login.microsoftonline.com/common",
                redirectUri: "https://gasserrashed454-glitch.github.io/Zonix-cloud/"
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        function switchNode(node) {
            currentNode = node;
            // Update UI
            document.getElementById('nav-onedrive').classList.remove('active-node');
            document.getElementById('nav-gdrive').classList.remove('active-node');
            document.getElementById(`nav-${node}`).classList.add('active-node');
            
            if(node === 'onedrive') {
                document.getElementById('node-title').innerText = "OneDrive Node";
                document.getElementById('connectBtn').innerText = "Initialize OneDrive";
                document.getElementById('connectBtn').style.opacity = "1";
                document.getElementById('cap-val').innerText = "100 GB";
            } else {
                document.getElementById('node-title').innerText = "G-Drive Node";
                document.getElementById('connectBtn').innerText = "Initialize G-Drive";
                document.getElementById('cap-val').innerText = "15 GB";
            }
            
            // Clear file list for new node
            document.getElementById('fileList').innerHTML = '<i class="fa-solid fa-terminal text-4xl mb-4 opacity-10"></i><p class="text-xs uppercase tracking-[0.2em] font-bold">Awaiting Auth Handshake...</p>';
            document.getElementById('sync-val').innerText = "Inactive";
            document.getElementById('sync-val').className = "text-2xl font-bold text-gray-700";
        }

        async function initiateAuth() {
            if (currentNode === 'onedrive') {
                await connectOneDrive();
            } else {
                alert("Google Drive integration requires a Google Cloud Client ID. Please configure it in your console.");
            }
        }

        async function connectOneDrive() {
            try {
                const loginResponse = await msalInstance.loginPopup({
                    scopes: ["user.read", "Files.Read.All"],
                    prompt: "select_account"
                });
                
                document.getElementById('status-text').innerText = "Online - OneDrive";
                document.getElementById('status-text').className = "text-xs text-green-400 font-bold";
                document.getElementById('sync-val').innerText = "Live";
                document.getElementById('sync-val').className = "text-2xl font-bold text-green-500";
                document.getElementById('connectBtn').innerText = "Node Linked";
                document.getElementById('connectBtn').style.opacity = "0.5";
                
                getFiles(loginResponse.accessToken);
            } catch (err) {
                console.error(err);
                alert("Auth Failure: Check Azure SPA Redirect URI settings.");
            }
        }

        async function getFiles(token) {
            const response = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", {
                headers: { Authorization: `Bearer ${token}` }
            });
            const data = await response.json();
            renderFiles(data.value);
        }

        function renderFiles(files) {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            list.className = "p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4";
            
            if (files && files.length > 0) {
                files.forEach(file => {
                    const item = document.createElement('div');
                    item.className = "file-card glass p-5 rounded-3xl flex items-center gap-4 cursor-pointer border border-white/5";
                    item.innerHTML = `
                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center">
                            <i class="fa-solid ${file.folder ? 'fa-folder text-yellow-500' : 'fa-file-lines text-blue-400'} text-xl"></i>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <p class="text-xs font-bold text-white truncate">${file.name}</p>
                            <p class="text-[9px] text-gray-500 uppercase tracking-tighter">${file.size ? (file.size/1024/1024).toFixed(2) + ' MB' : 'Directory'}</p>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } else {
                list.innerHTML = '<p class="text-gray-600 text-xs uppercase font-bold tracking-widest">Node Empty</p>';
            }
        }
    </script>
</body>
</html>
