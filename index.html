<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zonix | Unified Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0d0e12; color: #adb5bd; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .sidebar { background: #15171e; width: 260px; border-right: 1px solid #1e2129; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #1c1f26; color: white; border-left-color: #3b82f6; }
        .view-section { display: none; height: 100%; overflow-y: auto; padding: 32px; }
        .view-section.active { display: block; }
        .file-row { border-bottom: 1px solid #1e2129; transition: 0.2s; }
        .file-row:hover { background: #1c1f26; }
        .badge-shared { background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="flex h-full">
        <aside class="sidebar">
            <div class="p-6 border-b border-[#1e2129]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">Z</div>
                    <span class="text-white font-bold tracking-tight text-xl">Zonix</span>
                </div>
                <p class="text-[10px] text-blue-500 font-bold uppercase mb-1">Node: Active</p>
                <p class="text-white font-semibold">Mohamed Rashed</p>
            </div>
            <nav class="mt-4 flex-1">
                <div onclick="showView('files')" id="nav-files" class="nav-item active"><i class="fa-solid fa-folder-tree"></i> <span>Files</span></div>
                <div onclick="showView('startup')" id="nav-startup" class="nav-item"><i class="fa-solid fa-rocket"></i> <span>Startup</span></div>
                <div onclick="showView('network')" id="nav-network" class="nav-item"><i class="fa-solid fa-network-wired"></i> <span>Network</span></div>
                <div onclick="showView('users')" id="nav-users" class="nav-item"><i class="fa-solid fa-users"></i> <span>Users</span></div>
            </nav>
            <div class="p-4 border-t border-[#1e2129]">
                <button onclick="switchAccount()" class="w-full py-2 text-[10px] font-bold text-gray-500 hover:text-white uppercase">Switch Account</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <section id="view-files" class="view-section active">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-2xl text-white font-bold">Unified File Manager</h1>
                        <p class="text-xs text-gray-500">Showing Personal & 100GB Shared Volume</p>
                    </div>
                    <button id="ms-login" class="bg-white text-black px-6 py-2 rounded font-bold text-xs uppercase hover:bg-gray-200">Initialize Node</button>
                </div>

                <div class="bg-[#15171e] border border-[#1e2129] rounded-xl overflow-hidden">
                    <div class="bg-[#1c1f26] p-4 flex text-[10px] font-bold text-gray-500 uppercase tracking-wider">
                        <div class="w-1/2">Name / Source</div>
                        <div class="w-1/4">Size</div>
                        <div class="w-1/4 text-right">Actions</div>
                    </div>
                    <div id="file-list" class="min-h-[400px] flex flex-col italic text-gray-600 text-sm items-center justify-center">
                        <i class="fa-solid fa-network-wired text-3xl mb-3 opacity-20"></i>
                        Awaiting Handshake...
                    </div>
                </div>
            </section>

            <section id="view-startup" class="view-section"><h1 class="text-white text-2xl font-bold">Startup Controls Ready.</h1></section>
            <section id="view-network" class="view-section"><h1 class="text-white text-2xl font-bold">Network Monitor Active.</h1></section>
            <section id="view-users" class="view-section"><h1 class="text-white text-2xl font-bold">User Management Ready.</h1></section>
        </main>
    </div>

    <script>
        const msalConfig = {
            auth: { clientId: "65edd14c-cf8a-4e75-8b19-1b185fc86b78", authority: "https://login.microsoftonline.com/common", redirectUri: window.location.href }
        };
        const client = new msal.PublicClientApplication(msalConfig);

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.getElementById('nav-'+v).classList.add('active');
        }

        document.getElementById('ms-login').addEventListener('click', async () => {
            try {
                const res = await client.loginPopup({ scopes: ["Files.Read.All"], prompt: "select_account" });
                fetchUnifiedFiles(res.accessToken);
            } catch (err) { console.error(err); }
        });

        async function fetchUnifiedFiles(token) {
            const listContainer = document.getElementById('file-list');
            listContainer.innerHTML = '<div class="p-10 text-center text-blue-400">Fetching Unified Data...</div>';

            try {
                // 1. Get Personal Files
                const personalReq = fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", { headers: { Authorization: `Bearer ${token}` } });
                // 2. Get Shared Files (Where the 100GB folder is)
                const sharedReq = fetch("https://graph.microsoft.com/v1.0/me/drive/sharedWithMe", { headers: { Authorization: `Bearer ${token}` } });

                const [pRes, sRes] = await Promise.all([personalReq, sharedReq]);
                const pData = await pRes.json();
                const sData = await sRes.json();

                renderFiles(pData.value, sData.value);
            } catch (e) {
                listContainer.innerHTML = '<div class="p-10 text-red-500">Connection Failed.</div>';
            }
        }

        function renderFiles(personal, shared) {
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            list.classList.remove('items-center', 'justify-center', 'italic');

            const allFiles = [
                ...personal.map(f => ({ ...f, origin: 'Personal' })),
                ...shared.map(f => ({ ...f, origin: 'Shared' }))
            ];

            allFiles.forEach(f => {
                const size = f.size ? (f.size / (1024**3)).toFixed(2) + " GB" : "--";
                const isFolder = f.folder || f.remoteItem?.folder;
                
                list.innerHTML += `
                    <div class="file-row flex items-center p-4 text-xs">
                        <div class="w-1/2 flex items-center gap-3">
                            <i class="fa-solid ${isFolder ? 'fa-folder text-yellow-500' : 'fa-file text-blue-400'}"></i>
                            <div>
                                <p class="text-white font-medium">${f.name || f.remoteItem.name}</p>
                                <span class="badge-shared">${f.origin.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="w-1/4 text-gray-500 font-mono">${size}</div>
                        <div class="w-1/4 text-right">
                            <button class="text-blue-500 hover:underline">Manage</button>
                        </div>
                    </div>
                `;
            });
        }

        async function switchAccount() {
            const accounts = client.getAllAccounts();
            if (accounts.length > 0) await client.logoutPopup({ account: accounts[0] });
            location.reload();
        }
    </script>
</body>
</html>
