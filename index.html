<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zonix | v2.0 Next-Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg: #050507;
            --card: #0f1117;
            --accent: #3b82f6;
            --border: rgba(255,255,255,0.08);
        }

        body { 
            background-color: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh; 
        }

        /* Glass Effects */
        .glass { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .sidebar { width: 280px; border-right: 1px solid var(--border); background: #0a0b10; }
        
        /* Modern Login Gate */
        #login-gate {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle at center, #111827 0%, #050507 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .login-box {
            width: 100%; max-width: 400px; padding: 40px;
            border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            color: white; width: 100%; transition: 0.3s;
            font-family: 'JetBrains Mono', monospace;
        }
        .input-field:focus { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); outline: none; }

        .nav-btn {
            padding: 14px 20px; margin: 4px 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
            font-size: 14px; font-weight: 600; color: #94a3b8;
            transition: 0.2s; cursor: pointer;
        }
        .nav-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        
        .file-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; transition: 0.2s;
        }
        .file-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.04); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="login-box glass">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-4xl font-extrabold mb-6 shadow-lg shadow-blue-500/20">Z</div>
            <h2 class="text-2xl font-extrabold text-white mb-2">Zonix Terminal</h2>
            <p class="text-gray-500 text-sm mb-8">Authorization required to mount nodes.</p>
            
            <input type="password" id="sys-pass" class="input-field mb-4" placeholder="••••••••">
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/30">
                Unlock System
            </button>
            <p id="login-err" class="text-red-500 text-xs mt-4 opacity-0 font-bold uppercase tracking-widest">Invalid Security Key</p>
        </div>
    </div>

    <div id="app" class="hidden flex h-full">
        <aside class="sidebar flex flex-col">
            <div class="p-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">Z</div>
                    <h1 class="text-xl font-black tracking-tighter text-white">ZONIX<span class="text-blue-500">.</span></h1>
                </div>
            </div>

            <nav class="flex-1 space-y-1">
                <div onclick="switchTab('files')" id="tab-files" class="nav-btn active"><i class="fa-solid fa-hard-drive"></i> Unified Storage</div>
                <div onclick="switchTab('stats')" id="tab-stats" class="nav-btn"><i class="fa-solid fa-chart-line"></i> Performance</div>
                <div onclick="switchTab('users')" id="tab-users" class="nav-item nav-btn"><i class="fa-solid fa-shield-halved"></i> Sub-Users</div>
            </nav>

            <div class="p-6">
                <div class="glass rounded-2xl p-4">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Authenticated as</p>
                    <p class="text-xs text-white font-bold truncate">Mohamed Rashed</p>
                    <button onclick="location.reload()" class="text-[10px] text-red-400 font-bold mt-3 block hover:text-red-300">LOGOUT SYSTEM</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#050507]">
            <section id="view-files" class="p-10 overflow-y-auto">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h2 class="text-3xl font-extrabold text-white">Unified Storage</h2>
                        <p class="text-gray-500 text-sm">Aggregating Personal and 100GB Shared Node</p>
                    </div>
                    <button id="ms-connect" class="bg-white text-black px-8 py-3 rounded-xl font-bold text-xs uppercase hover:scale-105 transition-transform">
                        <i class="fa-brands fa-microsoft mr-2"></i> Initialize Handshake
                    </button>
                </div>

                <div id="file-grid" class="space-y-2">
                    <div class="py-20 text-center opacity-20">
                        <i class="fa-solid fa-folder-open text-6xl mb-4"></i>
                        <p class="font-bold">Awaiting Cloud Handshake...</p>
                    </div>
                </div>
            </section>

            <section id="view-stats" class="hidden p-10">
                <h2 class="text-2xl font-bold text-white mb-8">Performance Monitor</h2>
                <div class="glass p-8 rounded-3xl h-80"><canvas id="perfChart"></canvas></div>
            </section>
        </main>
    </div>

    <script>
        // 1. SYSTEM SECURITY
        function checkAccess() {
            const pass = document.getElementById('sys-pass').value;
            if(pass === "zonix2026" || pass === "smr2010000") {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else {
                const err = document.getElementById('login-err');
                err.style.opacity = "1";
                setTimeout(() => err.style.opacity = "0", 2000);
            }
        }

        // 2. TABS
        function switchTab(t) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + t).classList.remove('hidden');
            document.getElementById('tab-' + t).classList.add('active');
            if(t === 'stats') initStats();
        }

        // 3. UNIFIED CLOUD LOGIC (Fixing the "Missing Files" Issue)
        const msalConfig = {
            auth: { 
                clientId: "65edd14c-cf8a-4e75-8b19-1b185fc86b78", 
                authority: "https://login.microsoftonline.com/common" 
            }
        };
        const client = new msal.PublicClientApplication(msalConfig);

        document.getElementById('ms-connect').addEventListener('click', async () => {
            try {
                const loginRes = await client.loginPopup({
                    scopes: ["User.Read", "Files.Read", "Files.Read.All", "Sites.Read.All"], // Added more scopes to find shared files
                    prompt: "select_account"
                });
                loadUnifiedFiles(loginRes.accessToken);
            } catch (err) { alert("Handshake Error: Check Popups"); }
        });

        async function loadUnifiedFiles(token) {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '<div class="p-10 text-center text-blue-500 font-bold animate-pulse">Mounting Virtual Drives...</div>';

            try {
                // Fetch 1: Personal Files
                const pReq = await fetch("https://graph.microsoft.com/v1.0/me/drive/root/children", {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                // Fetch 2: Shared With Me (This is where the 100GB folder lives)
                const sReq = await fetch("https://graph.microsoft.com/v1.0/me/drive/sharedWithMe", {
                    headers: { Authorization: `Bearer ${token}` }
                });

                const personal = await pReq.json();
                const shared = await sReq.json();

                let html = '';
                const combined = [
                    ...(personal.value || []).map(i => ({...i, type: 'Personal'})),
                    ...(shared.value || []).map(i => ({...i, type: 'Shared Node'}))
                ];

                combined.forEach(item => {
                    const name = item.name || item.remoteItem?.name;
                    const size = item.size ? (item.size / (1024**3)).toFixed(2) + " GB" : "DIR";
                    const isFolder = item.folder || item.remoteItem?.folder;

                    html += `
                        <div class="file-card">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-white/5">
                                    <i class="fa-solid ${isFolder ? 'fa-folder text-yellow-500' : 'fa-file text-blue-500'}"></i>
                                </div>
                                <div>
                                    <p class="text-white font-bold text-sm">${name}</p>
                                    <span class="text-[9px] font-black px-2 py-0.5 rounded bg-blue-500/10 text-blue-500 uppercase">${item.type}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-mono text-gray-500">${size}</p>
                                <button class="text-[10px] text-blue-400 font-bold hover:underline mt-1">OPEN NODE</button>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html || '<p class="text-center p-20 text-gray-600 italic">No nodes found.</p>';
            } catch (e) {
                grid.innerHTML = '<p class="text-center p-20 text-red-500 font-bold">API Access Revoked by Microsoft.</p>';
            }
        }

        function initStats() {
            const ctx = document.getElementById('perfChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { labels: [1,2,3,4,5], datasets: [{ label: 'Traffic', data: [10,25,15,30,20], borderColor: '#3b82f6', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
